name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: "3.9"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest httpx black
        
    - name: Lint with Black
      run: |
        black --check .
        
    - name: Run Tests
      # We skip model loading based tests if artifacts aren't present in CI environment
      # or we mock them. For this skeleton, we assume unit tests/mocks.
      run: |
        pytest tests/test_api.py
